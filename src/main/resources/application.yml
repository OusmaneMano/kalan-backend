spring:
  application:
    name: kalan-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/kalan_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Mano7824}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mvc:
    cors:
      allowed-origins: "*"

server:
  port: ${PORT:8080}

# JWT config
kalan:
  jwt:
    secret: ${JWT_SECRET:kalan-super-secret-key-change-in-production-min-32-chars}
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  payments:
    enforce: ${PAYMENTS_ENFORCE:false}

# PayPal (card + PayPal checkout). Set the two secrets as Render env vars.
# base-url stays sandbox until you switch to https://api-m.paypal.com for live.
paypal:
  base-url: ${PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
  client-id: ${PAYPAL_CLIENT_ID:}
  secret: ${PAYPAL_SECRET:}
  # These are intercepted by the app's webview; they don't need to be real pages.
  return-url: ${PAYPAL_RETURN_URL:https://kalan.app/paypal/return}
  cancel-url: ${PAYPAL_CANCEL_URL:https://kalan.app/paypal/cancel}

logging:
  level:
    com.kalan: DEBUG
    org.springframework.security: INFO